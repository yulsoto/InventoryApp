{% extends "base.html" %}

{% block title %}{{ error_code }} — InventoryPro{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">

        <!-- Error Icon + Code -->
        <div class="mb-4">
            {% if error_code == 404 %}
                <i class="bi bi-search display-1 text-muted"></i>
            {% elif error_code == 500 %}
                <i class="bi bi-exclamation-triangle-fill display-1 text-danger"></i>
            {% else %}
                <i class="bi bi-x-circle-fill display-1 text-warning"></i>
            {% endif %}
        </div>

        <h1 class="fw-bold display-4 text-secondary">{{ error_code }}</h1>
        <h2 class="h4 mb-3">{{ error_message }}</h2>
        <p class="text-muted mb-4">{{ error_detail }}</p>

        <a href="{{ url_for('inventory.index') }}" class="btn btn-primary px-5">
            <i class="bi bi-house-fill me-2"></i>Back to Inventory
        </a>

    </div>
</div>

{% endblock %}
